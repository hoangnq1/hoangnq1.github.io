<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Support / Góp ý</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    textarea {
      width: 90%;
      max-width: 500px;
      height: 140px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #6c5ce7;
      color: white;
      cursor: pointer;
    }

    #status {
      margin-top: 15px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

  <h1>🔮 Góp ý cho tôi</h1>

  <textarea id="msg" placeholder="Nhập góp ý..."></textarea>
  <br>

  <button onclick="sendFeedback()">Gửi</button>

  <p id="status"></p>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://zxhhbilnvpawxlffgmvp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_A05zDd2I2AbN3MritN9Iig_sYEHSrqm";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function sendFeedback() {
      const message = document.getElementById("msg").value;
      const status = document.getElementById("status");

      if (!message.trim()) {
        status.innerText = "❌ Bạn chưa nhập nội dung!";
        return;
      }

      status.innerText = "⏳ Đang gửi...";

      const { error } = await supabase
        .from("feedback")
        .insert([{ message }]);

      if (error) {
        console.log(error);
        status.innerText = "❌ Gửi thất bại!";
      } else {
        status.innerText = "✅ Gửi thành công!";
        document.getElementById("msg").value = "";
      }
    }

    window.sendFeedback = sendFeedback;
  </script>

</body>
</html>
